services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codearena
      POSTGRES_PASSWORD: codearena
      POSTGRES_DB: codearena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://codearena:codearena@postgres:5432/codearena?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      CORS_ORIGIN: http://localhost:5173
      EXECUTOR_MODE: mock
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: npm run worker -w apps/api
    environment:
      DATABASE_URL: postgresql://codearena:codearena@postgres:5432/codearena?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      EXECUTOR_MODE: mock
    depends_on:
      - api
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
